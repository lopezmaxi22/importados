<style>
:root{
  --tinta:#0b0d0b;
  --panel:#141813;
  --panel-2:#1a1f19;
  --borde:rgba(201,162,75,.16);
  --borde-fuerte:rgba(201,162,75,.42);
  --oro:#c9a24b;
  --oro-claro:#e6c877;
  --oro-oscuro:#9a7a34;
  --crema:#f4efe3;
  --crema-2:rgba(244,239,227,.64);
  --crema-3:rgba(244,239,227,.4);
  --wa:#25d366;
  --grad-oro:linear-gradient(160deg,var(--oro-claro),var(--oro) 55%,var(--oro-oscuro));
  --serif:'Cormorant Garamond',serif;
  --sans:'Jost',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--tinta);color:var(--crema);font-family:var(--sans);
  line-height:1.55;font-weight:400;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;-webkit-tap-highlight-color:transparent;
}

/* ====== PORTADA a pantalla completa ====== */
.portada{
  position:relative;min-height:100svh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:40px 24px;overflow:hidden;
}
/* patrón geométrico árabe sutil de fondo */
.portada::before{
  content:"";position:absolute;inset:0;z-index:0;opacity:.05;
  background-image:
    repeating-linear-gradient(45deg, var(--oro) 0 1px, transparent 1px 22px),
    repeating-linear-gradient(-45deg, var(--oro) 0 1px, transparent 1px 22px);
  -webkit-mask-image:radial-gradient(ellipse 70% 70% at 50% 45%, #000 30%, transparent 75%);
  mask-image:radial-gradient(ellipse 70% 70% at 50% 45%, #000 30%, transparent 75%);
}
.portada::after{
  content:"";position:absolute;inset:0;z-index:0;
  background:radial-gradient(ellipse 60% 50% at 50% 42%, rgba(201,162,75,.14), transparent 62%);
}
.portada-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;animation:subir 1s ease both}
@keyframes subir{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.emblema-grande{width:130px;height:130px;position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:26px}
.emblema-grande svg{width:100%;height:100%;position:absolute;inset:0;animation:girar 60s linear infinite}
@keyframes girar{to{transform:rotate(360deg)}}
.emblema-grande .mono{font-family:var(--serif);font-weight:600;font-size:58px;background:var(--grad-oro);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.02em;z-index:2}

.portada-nombre{font-family:var(--serif);font-weight:600;font-size:clamp(38px,12vw,72px);letter-spacing:.14em;line-height:1;color:var(--crema);padding-left:.14em}
.portada-linea{display:flex;align-items:center;gap:14px;margin:20px 0}
.portada-linea span{height:1px;width:44px;background:linear-gradient(90deg,transparent,var(--oro))}
.portada-linea span:last-child{background:linear-gradient(90deg,var(--oro),transparent)}
.portada-linea b{font-family:var(--serif);font-style:italic;font-weight:500;color:var(--oro);font-size:16px;letter-spacing:.04em}
.portada-sub{font-size:12px;letter-spacing:.42em;text-transform:uppercase;color:var(--crema-2);font-weight:400;padding-left:.42em;max-width:320px}
.portada-cta{
  margin-top:38px;display:inline-flex;align-items:center;gap:10px;
  background:transparent;border:1px solid var(--borde-fuerte);color:var(--crema);
  font-family:var(--sans);font-weight:500;font-size:13px;letter-spacing:.12em;text-transform:uppercase;
  padding:14px 28px;border-radius:999px;cursor:pointer;text-decoration:none;
  transition:background .25s, border-color .25s, color .25s;
}
.portada-cta:hover{background:var(--grad-oro);border-color:transparent;color:#1a1305}
.portada-cta .fl{width:7px;height:7px;border-right:1.5px solid currentColor;border-bottom:1.5px solid currentColor;transform:rotate(45deg);margin-top:-2px}
.scroll-ind{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:2;color:var(--crema-3);font-size:10px;letter-spacing:.3em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:8px;animation:latir 2.4s ease-in-out infinite}
.scroll-ind .ch{width:8px;height:8px;border-right:1px solid var(--oro);border-bottom:1px solid var(--oro);transform:rotate(45deg)}
@keyframes latir{0%,100%{opacity:.5;transform:translateX(-50%) translateY(0)}50%{opacity:1;transform:translateX(-50%) translateY(4px)}}

/* ====== NAVBAR (aparece al scrollear) ====== */
nav{position:sticky;top:0;z-index:40;background:rgba(11,13,11,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--borde)}
.nav-inner{max-width:1080px;margin:0 auto;padding:12px 16px 12px}
.logoB{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.logoB .emb{width:40px;height:40px;position:relative;display:flex;align-items:center;justify-content:center;flex:none}
.logoB .emb svg{width:100%;height:100%;position:absolute;inset:0}
.logoB .mono{font-family:var(--serif);font-weight:600;font-size:19px;background:var(--grad-oro);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;z-index:2;line-height:1}
.logoB .texto .n{font-family:var(--serif);font-weight:600;font-size:19px;letter-spacing:.15em;line-height:1;color:var(--crema)}
.logoB .texto .s{font-size:7.5px;letter-spacing:.36em;text-transform:uppercase;color:var(--oro);margin-top:2px;padding-left:.36em}
.fila-filtros{display:flex;flex-direction:column;gap:10px}
.buscador{position:relative}
.buscador svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--crema-3);fill:none;stroke-width:1.6;pointer-events:none}
.buscador input{width:100%;background:var(--panel);border:1px solid var(--borde);border-radius:11px;color:var(--crema);font-family:var(--sans);font-size:16px;font-weight:400;padding:11px 16px 11px 40px;outline:none;transition:border-color .2s, box-shadow .2s}
.buscador input::placeholder{color:var(--crema-3)}
.buscador input:focus{border-color:var(--oro);box-shadow:0 0 0 3px rgba(201,162,75,.12)}
.chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;border:1px solid var(--borde);background:transparent;color:var(--crema-2);font-family:var(--sans);font-weight:500;font-size:13px;letter-spacing:.04em;padding:8px 17px;border-radius:999px;cursor:pointer;transition:all .2s;white-space:nowrap}
.chip:active{transform:scale(.95)}
.chip.activo{background:var(--grad-oro);border-color:transparent;color:#1a1305;font-weight:600}

main{max-width:1080px;margin:0 auto;padding:8px 14px 130px}

/* ====== tira ====== */
.tira{margin:16px 0 4px;border:1px solid var(--borde);border-radius:16px;background:var(--panel);overflow:hidden;position:relative}
.tira-label{position:absolute;top:0;left:0;z-index:3;background:var(--grad-oro);color:#1a1305;font-size:9px;font-weight:600;letter-spacing:.16em;padding:6px 14px;border-radius:0 0 12px 0;text-transform:uppercase}
.tira::before,.tira::after{content:"";position:absolute;top:0;bottom:0;width:48px;z-index:2;pointer-events:none}
.tira::before{left:0;background:linear-gradient(90deg,var(--panel),transparent)}
.tira::after{right:0;background:linear-gradient(270deg,var(--panel),transparent)}
.tira-pista{display:flex;gap:12px;width:max-content;padding:16px;animation:desfile 42s linear infinite}
.tira:hover .tira-pista,.tira:active .tira-pista{animation-play-state:paused}
@keyframes desfile{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tira-item{flex:none;width:78px;text-align:center;cursor:pointer;transition:transform .2s}
.tira-item:hover{transform:translateY(-3px)}
.tira-foto{width:78px;height:78px;border-radius:12px;overflow:hidden;background:#fff;border:1px solid var(--borde);display:flex;align-items:center;justify-content:center}
.tira-foto img{width:100%;height:100%;object-fit:contain;padding:6px}
.tira-foto .ph{font-family:var(--serif);font-size:30px;font-weight:600;color:var(--oro)}
.tira-nombre{font-size:10.5px;font-weight:500;margin-top:6px;color:var(--crema-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media (prefers-reduced-motion:reduce){.tira-pista{animation:none;flex-wrap:wrap;justify-content:center}}

/* ====== encabezado de sección con carácter ====== */
.sec-head{margin:38px 0 18px;text-align:center;position:relative}
.sec-head .kicker{font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:var(--oro);font-weight:500}
.sec-head h2{font-family:var(--serif);font-size:clamp(26px,7vw,34px);font-weight:600;letter-spacing:.04em;color:var(--crema);margin-top:6px;line-height:1.05}
.sec-head .orna{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px}
.sec-head .orna span{height:1px;width:40px;background:linear-gradient(90deg,transparent,var(--oro))}
.sec-head .orna span:last-child{background:linear-gradient(90deg,var(--oro),transparent)}
.sec-head .orna b{width:5px;height:5px;background:var(--oro);transform:rotate(45deg);flex:none}
.sec-head .cant{font-size:11px;color:var(--crema-3);margin-top:8px;letter-spacing:.1em}

.grilla{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media (min-width:640px){.grilla{grid-template-columns:repeat(3,1fr);gap:18px}}
@media (min-width:960px){.grilla{grid-template-columns:repeat(4,1fr);gap:20px}}
.vacio{text-align:center;color:var(--crema-2);padding:60px 20px;font-size:15px}

/* ====== tarjeta refinada ====== */
.card{background:var(--panel);border:1px solid var(--borde);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;position:relative;opacity:0;transform:translateY(18px);transition:transform .3s, border-color .3s, box-shadow .3s}
.card.visible{animation:aparecer .55s ease both}
@keyframes aparecer{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-5px);border-color:var(--borde-fuerte);box-shadow:0 22px 46px -20px rgba(0,0,0,.9), 0 0 34px -14px rgba(201,162,75,.45)}
.foto-wrap{padding:10px 10px 0}
.foto{aspect-ratio:1/1;position:relative;overflow:hidden;background:#fff;border-radius:12px;border:1px solid rgba(201,162,75,.2)}
.foto img{width:100%;height:100%;object-fit:contain;display:block;padding:8px;transition:transform .5s ease}
.card:hover .foto img{transform:scale(1.06)}
.placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(165deg,#1a1f19,#0b0d0b)}
.placeholder .letra{font-family:var(--serif);font-size:54px;font-weight:600;color:var(--oro);opacity:.92;line-height:1}
.etiqueta{position:absolute;top:8px;left:8px;z-index:2;background:rgba(11,13,11,.82);backdrop-filter:blur(6px);border:1px solid var(--borde-fuerte);color:var(--oro-claro);font-weight:600;font-size:8.5px;letter-spacing:.14em;padding:5px 10px;border-radius:999px}
.sin-stock .foto{filter:grayscale(1) brightness(.5)}
.badge-stock{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:2;background:rgba(11,13,11,.92);border:1px solid var(--borde-fuerte);color:var(--crema);font-size:10px;letter-spacing:.14em;padding:4px 12px;border-radius:999px;text-transform:uppercase;white-space:nowrap}
.info{padding:12px 14px 15px;display:flex;flex-direction:column;flex:1}
.marca{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--oro);font-weight:600}
.nombre{font-family:var(--serif);font-size:21px;font-weight:600;line-height:1.12;margin-top:2px;color:var(--crema)}
.desc{font-size:12px;color:var(--crema-2);margin-top:6px;flex:1;font-weight:300;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pie{margin-top:12px;padding-top:11px;border-top:1px solid var(--borde);display:flex;align-items:baseline;justify-content:space-between;gap:8px;flex-wrap:wrap}
.precio{font-size:18px;font-weight:500;color:var(--crema)}
.precio.consultar{font-size:12px;font-weight:600;color:var(--oro);letter-spacing:.06em;text-transform:uppercase}
.detalle{font-size:10px;color:var(--crema-3)}
.ver-mas-mini{margin-top:10px;font-size:11px;color:var(--oro);letter-spacing:.08em;text-transform:uppercase;font-weight:500;display:flex;align-items:center;gap:6px}
.ver-mas-mini::after{content:"";width:6px;height:6px;border-right:1.5px solid var(--oro);border-bottom:1.5px solid var(--oro);transform:rotate(-45deg)}
.btn-modelos{margin-top:11px;display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;background:transparent;border:1px solid var(--borde-fuerte);color:var(--crema);font-family:var(--sans);font-weight:500;font-size:12px;padding:9px 13px;border-radius:10px;cursor:pointer;transition:background .2s, border-color .2s}
.btn-modelos:hover{background:rgba(201,162,75,.1);border-color:var(--oro)}
.btn-modelos:focus-visible{outline:2px solid var(--oro);outline-offset:2px}
.btn-modelos .flecha{width:8px;height:8px;flex:none;border-right:2px solid var(--oro);border-bottom:2px solid var(--oro);transform:rotate(45deg) translateY(-2px);transition:transform .3s}
.btn-modelos[aria-expanded="true"] .flecha{transform:rotate(225deg) translateY(-1px)}
.panel-modelos{max-height:0;overflow:hidden;transition:max-height .35s, margin .35s}
.panel-modelos.abierto{max-height:520px;margin-top:10px}
.lista-modelos{border:1px solid var(--borde);border-radius:10px;overflow:hidden}
.modelo{padding:8px 12px;font-size:12px;font-weight:400;color:var(--crema)}
.modelo + .modelo{border-top:1px solid var(--borde)}

/* ====== WhatsApp ====== */
.wa-flotante{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:50;display:inline-flex;align-items:center;gap:10px;background:var(--wa);color:#07301d;text-decoration:none;font-weight:600;font-size:15px;padding:14px 26px;border-radius:999px;box-shadow:0 12px 32px -8px rgba(37,211,102,.6);transition:transform .18s, box-shadow .18s;white-space:nowrap;font-family:var(--sans)}
.wa-flotante:hover{transform:translateX(-50%) scale(1.05);box-shadow:0 14px 38px -6px rgba(37,211,102,.8)}
.wa-flotante:active{transform:translateX(-50%) scale(.96)}
.wa-flotante svg{width:21px;height:21px;fill:#07301d;flex:none}

/* ====== footer logo C ====== */
footer{border-top:1px solid var(--borde);padding:44px 20px 116px;text-align:center}
.logoC .lp{font-family:var(--serif);font-weight:700;font-size:46px;letter-spacing:.06em;background:var(--grad-oro);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.logoC .linea{width:54px;height:1px;background:linear-gradient(90deg,transparent,var(--oro),transparent);margin:12px auto}
.logoC .imp{font-size:11px;letter-spacing:.56em;text-transform:uppercase;color:var(--crema);padding-left:.56em}
.footer-sub{color:var(--crema-3);font-size:12px;margin-top:16px;letter-spacing:.04em;font-weight:300}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{transition:none!important;animation:none!important}
  html{scroll-behavior:auto}.card{opacity:1;transform:none}
  .emblema-grande svg{animation:none}
}

/* ====== FICHA de producto (modal) ====== */
.card{cursor:pointer}
.ficha-bg{position:fixed;inset:0;z-index:70;background:rgba(6,7,6,.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .25s ease}
.ficha-bg.abierta{display:flex;opacity:1}
.ficha{background:var(--tinta);border:1px solid var(--borde-fuerte);border-radius:22px 22px 0 0;width:100%;max-width:560px;max-height:94svh;overflow-y:auto;transform:translateY(30px);transition:transform .3s ease;position:relative}
.ficha-bg.abierta .ficha{transform:translateY(0)}
@media (min-width:560px){.ficha-bg{align-items:center}.ficha{border-radius:22px}}
.ficha-cerrar{position:sticky;top:0;z-index:5;display:flex;justify-content:flex-end;padding:12px 12px 0}
.ficha-cerrar button{width:38px;height:38px;border-radius:50%;background:var(--panel);border:1px solid var(--borde-fuerte);color:var(--crema);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .2s}
.ficha-cerrar button:hover{background:var(--panel-2)}
.ficha-gal{padding:0 20px}
.ficha-foto-grande{aspect-ratio:1/1;background:#fff;border-radius:16px;overflow:hidden;position:relative;border:1px solid rgba(201,162,75,.25)}
.ficha-foto-grande img{width:100%;height:100%;object-fit:contain;padding:14px;display:block}
.ficha-foto-grande .placeholder .letra{font-size:80px}
.ficha-thumbs{display:flex;gap:8px;margin-top:10px;justify-content:center}
.ficha-thumb{width:56px;height:56px;border-radius:10px;overflow:hidden;background:#fff;border:1px solid var(--borde);cursor:pointer;padding:0;transition:border-color .2s;flex:none}
.ficha-thumb.activa{border-color:var(--oro);border-width:2px}
.ficha-thumb img{width:100%;height:100%;object-fit:contain;padding:4px}
.ficha-body{padding:18px 22px 30px}
.ficha-marca{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--oro);font-weight:600}
.ficha-nombre{font-family:var(--serif);font-size:32px;font-weight:600;line-height:1.08;margin-top:4px;color:var(--crema)}
.ficha-precio{font-size:24px;font-weight:500;margin-top:12px;color:var(--crema)}
.ficha-precio.consultar{font-size:16px;color:var(--oro);letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.ficha-detalle{font-size:12px;color:var(--crema-3);margin-top:2px;letter-spacing:.04em}
.ficha-desc{font-size:14px;color:var(--crema-2);margin-top:16px;font-weight:300;line-height:1.7}
.ficha-versiones{margin-top:18px}
.ficha-versiones .vt{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--oro);font-weight:600;margin-bottom:8px}
.ficha-chips{display:flex;flex-wrap:wrap;gap:7px}
.ficha-chip{background:rgba(201,162,75,.1);border:1px solid var(--borde);border-radius:999px;padding:7px 14px;font-size:12.5px;font-weight:400;color:var(--crema)}
.ficha-wa{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;margin-top:24px;background:var(--wa);color:#07301d;text-decoration:none;font-weight:600;font-size:16px;padding:16px;border-radius:14px;font-family:var(--sans);transition:filter .2s}
.ficha-wa:hover{filter:brightness(1.06)}
.ficha-wa svg{width:22px;height:22px;fill:#07301d;flex:none}
.ficha-nostock{text-align:center;margin-top:18px;font-size:13px;color:var(--crema-3);letter-spacing:.1em;text-transform:uppercase}
</style>
</head>
<body>

<!-- ===== PORTADA a pantalla completa ===== -->
<header class="portada">
  <div class="portada-inner">
    <div class="emblema-grande">
      <svg viewBox="0 0 130 130" fill="none">
        <circle cx="65" cy="65" r="63" stroke="url(#gp)" stroke-width="1"/>
        <circle cx="65" cy="65" r="56" stroke="url(#gp)" stroke-width="0.5" opacity="0.5"/>
        <circle cx="65" cy="2" r="1.8" fill="#c9a24b"/>
        <circle cx="65" cy="128" r="1.8" fill="#c9a24b"/>
        <circle cx="2" cy="65" r="1.8" fill="#c9a24b"/>
        <circle cx="128" cy="65" r="1.8" fill="#c9a24b"/>
        <defs><linearGradient id="gp" x1="0" y1="0" x2="130" y2="130">
          <stop stop-color="#e6c877"/><stop offset="0.5" stop-color="#c9a24b"/><stop offset="1" stop-color="#9a7a34"/>
        </linearGradient></defs>
      </svg>
      <span class="mono">LP</span>
    </div>
    <div class="portada-nombre">IMPORTADOS</div>
    <div class="portada-linea"><span></span><b>Fragancias &amp; más</b><span></span></div>
    <div class="portada-sub">Perfumes árabes · Originales garantizados</div>
    <a href="#catalogo" class="portada-cta">Ver catálogo <span class="fl"></span></a>
  </div>
  <div class="scroll-ind">Deslizá<div class="ch"></div></div>
</header>

<!-- ===== NAVBAR ===== -->
<nav id="catalogo">
  <div class="nav-inner">
    <div class="logoB">
      <div class="emb">
        <svg viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="19" stroke="url(#gn)" stroke-width="0.8"/>
          <circle cx="20" cy="20" r="16" stroke="url(#gn)" stroke-width="0.4" opacity="0.5"/>
          <defs><linearGradient id="gn" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#e6c877"/><stop offset="1" stop-color="#9a7a34"/></linearGradient></defs>
        </svg>
        <span class="mono">LP</span>
      </div>
      <div class="texto"><div class="n">IMPORTADOS</div><div class="s">Perfumes &amp; más</div></div>
    </div>
    <div class="fila-filtros">
      <div class="buscador">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        <input type="search" id="buscar" placeholder="Buscar perfume, marca, producto..." autocomplete="off" aria-label="Buscar en el catálogo">
      </div>
      <div class="chips" id="chips"></div>
    </div>
  </div>
</nav>

<main>
  <div class="tira" id="tira"></div>
  <div id="contenido"></div>
</main>

<footer>
  <div class="logoC"><div class="lp">LP</div><div class="linea"></div><div class="imp">IMPORTADOS</div></div>
  <div class="footer-sub" id="footer-sub"></div>
</footer>

<div class="ficha-bg" id="fichaBg" onclick="if(event.target===this)cerrarFicha()">
  <div class="ficha" id="fichaContenido"></div>
</div>

<a class="wa-flotante" id="wa-general" target="_blank" rel="noopener" aria-label="Pedir por WhatsApp">
  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2zm0 18.2c-1.6 0-3.1-.4-4.4-1.2l-.3-.2-3 .8.8-2.9-.2-.3A8.2 8.2 0 1 1 12 20.2zm4.6-6.1c-.3-.1-1.5-.7-1.7-.8-.2-.1-.4-.1-.6.1-.2.3-.7.8-.8 1-.1.2-.3.2-.5.1a6.7 6.7 0 0 1-3.4-3c-.3-.4 0-.5.1-.7l.4-.5c.1-.2.1-.3.2-.5s0-.4 0-.5l-.8-1.9c-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.2.3-.9.9-.9 2.2s1 2.6 1.1 2.7c.1.2 1.9 3 4.7 4.2.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.6-.1 1.5-.6 1.7-1.2.2-.6.2-1.1.2-1.2-.1-.1-.3-.2-.6-.3z"/></svg>
  Pedir por WhatsApp
</a>

<script>
const fmt = n => "$" + n.toLocaleString("es-AR");
const precioTxt = p => p.consultar ? "Consultar" : fmt(p.precio);
const EXTS = [".jpg",".jpeg",".png",".webp",".JPG",".PNG"];
function probImg(img, base, ini, modo){
  let k = parseInt(img.dataset.k||"0",10);
  if (k < EXTS.length){ img.dataset.k = k+1; img.src = base + EXTS[k]; }
  else if (modo === "tira"){ img.parentNode.innerHTML = '<span class="ph">'+ini+'</span>'; }
  else { img.insertAdjacentHTML("afterend", placeholderDe(ini)); img.remove(); }
}

document.getElementById("footer-sub").textContent = CONFIG.SUBTITULO;
document.getElementById("wa-general").href = "https://wa.me/" + CONFIG.WHATSAPP + "?text=" + encodeURIComponent(CONFIG.MENSAJE_WA);
document.title = CONFIG.NOMBRE_TIENDA + " — Catálogo";

const KICKERS = {
  "Perfumes Árabes":"Oriente en un frasco",
  "Perfumes Originales":"Firmas de diseñador",
  "Indumentaria":"Vestí la pasión",
  "Varios":"Encontrá tu próximo favorito"
};

const categorias = [...new Set(PRODUCTOS.map(p => p.categoria))];
let filtroActual = "Todo";
let textoBusqueda = "";

const chips = document.getElementById("chips");
["Todo", ...categorias].forEach(cat => {
  const b = document.createElement("button");
  b.className = "chip" + (cat === "Todo" ? " activo" : "");
  b.textContent = cat;
  b.onclick = () => {
    filtroActual = cat;
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("activo"));
    b.classList.add("activo");
    render();
    document.getElementById("catalogo").scrollIntoView({behavior:"smooth",block:"start"});
  };
  chips.appendChild(b);
});

document.getElementById("buscar").addEventListener("input", e => {
  textoBusqueda = e.target.value.trim().toLowerCase();
  render();
});

const contenido = document.getElementById("contenido");

function coincide(p){
  if (!textoBusqueda) return true;
  const pajar = (p.nombre + " " + p.marca + " " + p.descripcion + " " + (p.modelos || []).join(" ")).toLowerCase();
  return pajar.includes(textoBusqueda);
}

function renderTira(){
  const cont = document.getElementById("tira");
  if (!cont) return;
  if (textoBusqueda || filtroActual !== "Todo"){ cont.innerHTML=""; cont.style.display="none"; return; }
  cont.style.display="";
  const items = PRODUCTOS.filter(p => p.stock);
  const item = p => {
    const ini = p.nombre.trim().charAt(0).toUpperCase();
    return `<div class="tira-item" onclick="verProducto('${p.nombre.replace(/'/g,"\\'")}')">
      <div class="tira-foto"><img src="${p.foto}.webp" onerror="probImg(this,'${p.foto}','${ini}','tira')"></div>
      <div class="tira-nombre">${p.nombre}</div></div>`;
  };
  const html = items.map(item).join("") + items.map(item).join("");
  cont.innerHTML = `<div class="tira-label">En stock</div><div class="tira-pista">${html}</div>`;
}

function verProducto(nombre){
  const buscar = document.getElementById("buscar");
  buscar.value = nombre;
  textoBusqueda = nombre.toLowerCase();
  render();
  document.getElementById("catalogo").scrollIntoView({behavior:"smooth",block:"start"});
}

function tarjeta(p){
  const inicial = p.nombre.trim().charAt(0).toUpperCase();
  const tieneModelos = p.modelos && p.modelos.length > 0;
  const clasePrecio = p.consultar ? "precio consultar" : "precio";
  const idx = PRODUCTOS.indexOf(p);
  return `
  <article class="card${p.stock ? "" : " sin-stock"}" onclick="abrirFicha(${idx})">
    <div class="foto-wrap">
      <div class="foto">
        ${p.etiqueta ? `<span class="etiqueta">${p.etiqueta}</span>` : ""}
        ${p.stock ? "" : `<span class="badge-stock">Sin stock</span>`}
        <img src="${p.foto}.webp" alt="${p.nombre} — ${p.marca}" loading="lazy" onerror="probImg(this,'${p.foto}','${inicial}','card')">
      </div>
    </div>
    <div class="info">
      <div class="marca">${p.marca}</div>
      <h3 class="nombre">${p.nombre}</h3>
      <p class="desc">${p.descripcion}</p>
      <div class="pie">
        <span class="${clasePrecio}">${precioTxt(p)}</span>
        ${p.detalle ? `<span class="detalle">${p.detalle}</span>` : ""}
      </div>
      ${tieneModelos ? `<div class="ver-mas-mini">${p.modelos.length} versiones · ver</div>` : ""}
    </div>
  </article>`;
}

/* ====== FICHA de producto ====== */
let fichaFotoActual = 0;
let fichaProd = null;

function abrirFicha(idx){
  const p = PRODUCTOS[idx];
  if (!p) return;
  fichaProd = p;
  fichaFotoActual = 0;
  const inicial = p.nombre.trim().charAt(0).toUpperCase();
  // hasta 3 fotos: base, base-2, base-3 (la primera es el nombre base tal cual)
  const bases = [p.foto, p.foto + "-2", p.foto + "-3"];
  const cont = document.getElementById("fichaContenido");

  const mensaje = p.consultar
    ? `Hola! Me interesa ${p.nombre} de ${p.marca}. ¿Precio y stock? 🛍️`
    : `Hola! Quiero pedir ${p.nombre} de ${p.marca} (${fmt(p.precio)}) 🛍️`;
  const waLink = "https://wa.me/" + CONFIG.WHATSAPP + "?text=" + encodeURIComponent(mensaje);

  const thumbs = bases.map((b,i) =>
    `<button class="ficha-thumb${i===0?' activa':''}" onclick="cambiarFoto(${i})" id="fthumb${i}">
       <img src="${b}.webp" onerror="probImg(this,'${b}','${inicial}','tira')">
     </button>`
  ).join("");

  cont.innerHTML = `
    <div class="ficha-cerrar"><button onclick="cerrarFicha()" aria-label="Cerrar">✕</button></div>
    <div class="ficha-gal">
      <div class="ficha-foto-grande" id="fichaFotoGrande">
        <img src="${bases[0]}.webp" alt="${p.nombre}" onerror="probImg(this,'${bases[0]}','${inicial}','card')">
      </div>
      <div class="ficha-thumbs">${thumbs}</div>
    </div>
    <div class="ficha-body">
      <div class="ficha-marca">${p.marca}</div>
      <h2 class="ficha-nombre">${p.nombre}</h2>
      <div class="ficha-precio ${p.consultar?'consultar':''}">${precioTxt(p)}</div>
      ${p.detalle ? `<div class="ficha-detalle">${p.detalle}</div>` : ""}
      ${p.descripcion ? `<p class="ficha-desc">${p.descripcion}</p>` : ""}
      ${(p.modelos && p.modelos.length) ? `
        <div class="ficha-versiones">
          <div class="vt">Versiones disponibles</div>
          <div class="ficha-chips">${p.modelos.map(m=>`<span class="ficha-chip">${m}</span>`).join("")}</div>
        </div>` : ""}
      ${p.stock
        ? `<a class="ficha-wa" href="${waLink}" target="_blank" rel="noopener">
             <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2z"/></svg>
             Pedir por WhatsApp
           </a>`
        : `<div class="ficha-nostock">Sin stock por ahora</div>`}
    </div>`;

  const bg = document.getElementById("fichaBg");
  bg.classList.add("abierta");
  document.body.style.overflow = "hidden";
  cont.scrollTop = 0;
}

function cambiarFoto(i){
  if (!fichaProd) return;
  const inicial = fichaProd.nombre.trim().charAt(0).toUpperCase();
  const bases = [fichaProd.foto, fichaProd.foto + "-2", fichaProd.foto + "-3"];
  fichaFotoActual = i;
  const grande = document.getElementById("fichaFotoGrande");
  grande.innerHTML = `<img src="${bases[i]}.webp" alt="${fichaProd.nombre}" onerror="probImg(this,'${bases[i]}','${inicial}','card')">`;
  document.querySelectorAll(".ficha-thumb").forEach((t,j)=>t.classList.toggle("activa", j===i));
}

function cerrarFicha(){
  document.getElementById("fichaBg").classList.remove("abierta");
  document.body.style.overflow = "";
  fichaProd = null;
}
document.addEventListener("keydown", e => { if (e.key === "Escape") cerrarFicha(); });

function render(){
  renderTira();
  contenido.innerHTML = "";
  const cats = filtroActual === "Todo" ? categorias : [filtroActual];
  let hayAlgo = false;
  cats.forEach(cat => {
    const productos = PRODUCTOS.filter(p => p.categoria === cat && coincide(p));
    if (!productos.length) return;
    hayAlgo = true;
    const sec = document.createElement("section");
    const kicker = KICKERS[cat] || "Selección LP";
    sec.innerHTML = `
      <div class="sec-head">
        <div class="kicker">${kicker}</div>
        <h2>${cat}</h2>
        <div class="orna"><span></span><b></b><span></span></div>
        <div class="cant">${productos.length} ${productos.length===1?'producto':'productos'}</div>
      </div>
      <div class="grilla">${productos.map(tarjeta).join("")}</div>`;
    contenido.appendChild(sec);
  });
  if (!hayAlgo) {
    contenido.innerHTML = `<p class="vacio">No encontramos nada con esa búsqueda.<br>Probá con otra palabra o escribinos por WhatsApp.</p>`;
  }
  observarTarjetas();
}

function placeholderDe(letra){ return `<div class="placeholder"><div class="letra">${letra}</div></div>`; }
function observarTarjetas(){
  const obs = new IntersectionObserver(entradas => {
    entradas.forEach((e, i) => {
      if (e.isIntersecting){ e.target.style.animationDelay = (i % 4) * 0.07 + "s"; e.target.classList.add("visible"); obs.unobserve(e.target); }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll(".card").forEach(c => obs.observe(c));
}
render();
</script>
</body>
</html>
